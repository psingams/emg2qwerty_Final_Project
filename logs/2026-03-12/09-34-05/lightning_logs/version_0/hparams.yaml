in_features: 528
mlp_features:
- 384
cnn_channels:
- 256
- 256
n_channels: 16
cnn_kernel_size: 5
lstm_hidden_size: 640
lstm_num_layers: 3
dropout: 0.2
bidirectional: true
optimizer:
  _target_: torch.optim.Adam
  lr: 0.001
lr_scheduler:
  scheduler:
    _target_: pl_bolts.optimizers.lr_scheduler.LinearWarmupCosineAnnealingLR
    warmup_epochs: 10
    max_epochs: 150
    warmup_start_lr: 1.0e-08
    eta_min: 1.0e-06
  interval: epoch
decoder:
  _target_: emg2qwerty.decoder.CTCGreedyDecoder
