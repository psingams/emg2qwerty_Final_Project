# @package _global_

module:
  _target_: emg2qwerty.lightning.CNNLSTMCTCModule
  in_features: 528
  mlp_features: [384]
  cnn_channels: [256, 256]
  cnn_kernel_size: 5
  n_channels: 16
  lstm_hidden_size: 320
  lstm_num_layers: 2
  dropout: 0.2
  bidirectional: true

datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 8000  # 4 sec windows for 2kHz EMG
  padding: [1800, 200]  # 900ms past context, 100ms future context